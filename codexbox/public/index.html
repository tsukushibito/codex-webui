<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex WebUI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Codex WebUI</h1>
          <p id="status" class="status">Booting session...</p>
        </div>
        <div class="meta">
          <span>Session</span>
          <code id="session-id">-</code>
        </div>
      </header>

      <main class="layout">
        <section class="chat-panel">
          <div id="messages" class="messages" aria-live="polite"></div>
          <form id="composer" class="composer">
            <textarea id="prompt" placeholder="Type your prompt..." rows="3"></textarea>
            <button id="send" type="submit">Send</button>
          </form>
        </section>

        <aside class="approval-panel">
          <section class="panel-section">
            <h2>Approvals</h2>
            <div id="approvals" class="approvals empty">No pending approvals.</div>
          </section>

          <section class="panel-section">
            <h2>User Input</h2>
            <div id="user-inputs" class="user-inputs empty">No pending user input requests.</div>
          </section>
        </aside>
      </main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
