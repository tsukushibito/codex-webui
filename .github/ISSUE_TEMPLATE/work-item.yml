name: Work Item
description: Track a deliverable-sized unit of repository work.
title: "<area>: <deliverable>"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Use one Issue per deliverable-sized unit of work.
        Keep temporary execution notes out of the Issue body.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: State the outcome in one or two sentences.
      placeholder: Add read-only Git diff endpoints for workspace comparison views.
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Explain why this work matters now.
      placeholder: The bundled WebUI needs a stable backend contract for diff rendering.
    validations:
      required: true

  - type: textarea
    id: in_scope
    attributes:
      label: In Scope
      description: List what this Issue includes.
      placeholder: |
        - Add GET /api/git/show
        - Add GET /api/git/diff
        - Validate modified, new, and deleted file cases
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: List adjacent work that is intentionally excluded.
      placeholder: |
        - Bundled WebUI diff pane rendering
        - Turn-local snapshot diffing
    validations:
      required: true

  - type: textarea
    id: consumer_boundary
    attributes:
      label: Consumer Boundary
      description: If this changes an API, event, schema, protocol, or other consumed interface, name the shipped consumers or say the work is backend-only.
      placeholder: |
        Backend-only contract change.
        Bundled WebUI consumption is tracked separately in #<issue>.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List verifiable outcomes.
      placeholder: |
        - diff endpoint exists
        - file show endpoint exists
        - new and deleted file cases are handled
    validations:
      required: true

  - type: textarea
    id: edge_cases_error_handling
    attributes:
      label: Edge Cases and Error Handling
      description: Required for interface and behavior changes. Call out invalid inputs, missing vs invalid distinctions, type/size/path constraints, and any special cases such as symlinks or directories.
      placeholder: |
        - Invalid ref returns a client-visible error instead of "exists: false"
        - Missing file at a valid ref returns an empty left or right side as appropriate
        - Path traversal is rejected
        - Binary, oversized, directory, and symlink behavior is explicit
    validations:
      required: true

  - type: textarea
    id: constraints_assumptions
    attributes:
      label: Constraints and Assumptions
      description: List operational constraints, assumptions, or non-goals that affect implementation.
      placeholder: |
        - Keep the change backend-only
        - Reuse existing workspace path safety checks where practical
    validations:
      required: true

  - type: textarea
    id: open_questions
    attributes:
      label: Open Questions
      description: List unresolved items and mark blockers explicitly.
      placeholder: |
        - None blocking
    validations:
      required: true
