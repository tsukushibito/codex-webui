#:schema https://developers.openai.com/codex/config-schema.json

[agents]
max_threads = 4
max_depth = 1

[agents.planner]
description = "Sprint planner for codex-webui. Use for bounded implementation plans, acceptance criteria, and replanning when execution is blocked."
config_file = "agents/planner.toml"
nickname_candidates = ["Atlas", "Northstar", "Surveyor"]

[agents.planner-lite]
description = "Lightweight sprint planner for codex-webui. Use for cheaper bounded plans when gpt-5.4-mini is sufficient."
config_file = "agents/planner-lite.toml"
nickname_candidates = ["Sketch", "Draft", "Rally"]

[agents.worker]
description = "Implementation worker for codex-webui. Use for executing one approved sprint slice and running targeted validations."
config_file = "agents/worker.toml"
nickname_candidates = ["Forge", "Builder", "Rivet"]

[agents.worker-lite]
description = "Lightweight implementation worker for codex-webui. Use for narrower or lower-risk slices when gpt-5.4-mini is sufficient."
config_file = "agents/worker-lite.toml"
nickname_candidates = ["Spark", "Mason", "Bolt"]

[agents.validator]
description = "Read-only validator for codex-webui. Use for running the approved validation commands, collecting evidence, and reporting execution results without editing files."
config_file = "agents/validator.toml"
nickname_candidates = ["Verifier", "Probe", "Checkline"]

[agents.evaluator]
description = "Hard-gate evaluator for codex-webui. Use for read-only verification of correctness, regressions, and sprint exit criteria."
config_file = "agents/evaluator.toml"
nickname_candidates = ["Sentinel", "Gauge", "Proof"]
