name: ${COMPOSE_PROJECT_NAME:-codex-webui-dev}

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UBUNTU_VERSION: ${UBUNTU_VERSION:-24.04}
        VSCODE_CLI_VERSION: ${VSCODE_CLI_VERSION:-1.109.3}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.14.3}
        UV_VERSION: ${UV_VERSION:-0.9.21}
        NODE_VERSION: ${NODE_VERSION:-25.6.0}
        NPM_VERSION: ${NPM_VERSION:-11.8.0}
        CODEX_NPM_VERSION: ${CODEX_NPM_VERSION:-latest}
        RUST_VERSION: ${RUST_VERSION:-1.93.1}
        VULKAN_SDK_VERSION: ${VULKAN_SDK_VERSION:-1.4.341.1}
    image: ${DEV_IMAGE_NAME:-codex-webui/dev}:${DEV_IMAGE_TAG:-latest}
    container_name: ${DEV_CONTAINER_NAME:-codex-webui-dev}
    init: true
    stdin_open: true
    tty: true
    runtime: nvidia
    group_add:
      - "0"
    gpus: all
    working_dir: /workspace
    ports:
      - "${CODEX_WEBUI_FRONTEND_PORT:-3000}:${CODEX_WEBUI_FRONTEND_PORT:-3000}"
      - "${CODEX_WEBUI_RUNTIME_PORT:-3001}:${CODEX_WEBUI_RUNTIME_PORT:-3001}"
    volumes:
      - ./:/workspace
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock.raw}:/var/run/docker.sock
      - codex_webui_dev_cache:/home/dev/.cache
      - codex_webui_dev_codex_auth:/home/dev/.codex
      - codex_webui_dev_codex_npm:/home/dev/.npm-global
      - codex_webui_dev_gh_auth:/home/dev/.config/gh
      - codex_webui_dev_vscode_cli:/home/dev/.vscode-cli
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      TUNNEL_NAME: ${TUNNEL_NAME:-codex-webui-dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CODEX_AUTO_UPDATE: ${CODEX_AUTO_UPDATE:-true}
      CODEX_NPM_VERSION: ${CODEX_NPM_VERSION:-latest}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      EXPECTED_PYTHON_VERSION: ${PYTHON_VERSION:-3.14.3}
      EXPECTED_UV_VERSION: ${UV_VERSION:-0.9.21}
      EXPECTED_NODE_VERSION: ${NODE_VERSION:-25.6.0}
      EXPECTED_NPM_VERSION: ${NPM_VERSION:-11.8.0}
      EXPECTED_RUST_VERSION: ${RUST_VERSION:-1.93.1}
      EXPECTED_VULKAN_SDK_VERSION: ${VULKAN_SDK_VERSION:-1.4.341.1}
      EXPECTED_NPM_PREFIX: ${EXPECTED_NPM_PREFIX:-/home/dev/.npm-global}
      DOCTOR_REQUIRE_GPU: ${DOCTOR_REQUIRE_GPU:-true}
      DOCTOR_RUN_WINIT_SMOKE: ${DOCTOR_RUN_WINIT_SMOKE:-false}
      CODEX_WEBUI_RUNTIME_PORT: ${CODEX_WEBUI_RUNTIME_PORT:-3001}
      CODEX_WEBUI_FRONTEND_PORT: ${CODEX_WEBUI_FRONTEND_PORT:-3000}
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      NGROK_BASIC_AUTH: ${NGROK_BASIC_AUTH:-}
      CODEX_WEBUI_DEVTUNNEL_ID: ${CODEX_WEBUI_DEVTUNNEL_ID:-}
      CODEX_WEBUI_WORKSPACE_ROOT: ${CODEX_WEBUI_WORKSPACE_ROOT:-}
      CODEX_WEBUI_DATABASE_PATH: ${CODEX_WEBUI_DATABASE_PATH:-}

volumes:
  codex_webui_dev_cache:
  codex_webui_dev_codex_auth:
  codex_webui_dev_codex_npm:
  codex_webui_dev_gh_auth:
  codex_webui_dev_vscode_cli:
